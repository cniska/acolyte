name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
          - target: linux-x64
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        if: matrix.target == 'linux-x64'
        run: bun run verify

      - name: Build binary
        run: bun build --compile src/cli.ts --outfile acolyte --external react-devtools-core

      - name: Smoke test binary
        run: ACOLYTE_SMOKE_EXTENDED=1 bash scripts/smoke-compiled.sh

      - name: Package artifact
        run: |
          mkdir -p artifacts
          tar -czf artifacts/acolyte-${{ matrix.target }}.tar.gz acolyte
          cd artifacts && sha256sum acolyte-${{ matrix.target }}.tar.gz > acolyte-${{ matrix.target }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acolyte-${{ matrix.target }}
          path: artifacts/

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare source archives
        run: |
          git archive --format=tar.gz --output=artifacts/acolyte-source-${GITHUB_REF_NAME}.tar.gz HEAD
          git archive --format=zip --output=artifacts/acolyte-source-${GITHUB_REF_NAME}.zip HEAD

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
