name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Change detection: gate the expensive lanes so a docs-only commit spends no
  # verify or compile minutes. `main` has no required checks, so a skipped lane
  # never blocks a merge.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'bunfig.toml'
              - 'biome.json'
              - '.github/workflows/ci.yml'

  pr-title:
    name: PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate PR title
        run: bash scripts/check-commit-message.sh "${{ github.event.pull_request.title }}"

  verify:
    name: Verify
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run dependency audit
        run: bun audit --audit-level=high --ignore=GHSA-xh87-mx6m-69f3

      - name: Run verify
        run: bun run verify

      - name: Run perf baseline
        run: |
          mkdir -p artifacts
          set -o pipefail
          bun run test:perf | tee artifacts/perf-baseline.json

      - name: Upload perf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: artifacts/perf-baseline.json

      - name: Generate coverage report
        run: bun run test:coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  # linux-x64 builds on every code change; darwin-arm64 runs on macOS runners,
  # which bill at ~10x, so it is kept off the PR loop and built only on push to
  # main -- the mac binary is still proven before release without paying 10x on
  # every PR iteration.
  compile:
    name: Compile (${{ matrix.target }})
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'push' && '[{"target":"linux-x64","runner":"ubuntu-latest"},{"target":"darwin-arm64","runner":"macos-latest"}]' || '[{"target":"linux-x64","runner":"ubuntu-latest"}]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile src/cli.ts --outfile acolyte --external react-devtools-core

      - name: Smoke test binary
        run: ACOLYTE_SMOKE_EXTENDED=1 bash scripts/smoke-compiled.sh
