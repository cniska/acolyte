name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Change detection: gate verify so a docs-only commit spends no verify minutes.
  # `main` has no required checks, so a skipped lane never blocks a merge.
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'bunfig.toml'
              - 'biome.json'
              - '.github/workflows/ci.yml'

  pr-title:
    name: PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate PR title
        run: bash scripts/check-commit-message.sh "${{ github.event.pull_request.title }}"

  verify:
    name: Verify
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run dependency audit
        run: bun audit --audit-level=high --ignore=GHSA-xh87-mx6m-69f3

      - name: Run verify
        run: bun run verify

      - name: Run perf baseline
        run: |
          mkdir -p artifacts
          set -o pipefail
          bun run test:perf | tee artifacts/perf-baseline.json

      - name: Upload perf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: artifacts/perf-baseline.json

      - name: Generate coverage report
        run: bun run test:coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  # Compiling + smoke-testing the binary is a nightly job, not a per-PR gate:
  # release.yml rebuilds and smokes both targets at tag time, so a broken binary
  # can never ship -- the nightly just surfaces mac/linux build breakage within a
  # day instead of paying compile minutes (macOS bills ~10x) on every merge.
  compile:
    name: Compile (${{ matrix.target }})
    if: github.event_name == 'schedule'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: darwin-arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile src/cli.ts --outfile acolyte --external react-devtools-core

      - name: Smoke test binary
        run: ACOLYTE_SMOKE_EXTENDED=1 bash scripts/smoke-compiled.sh
